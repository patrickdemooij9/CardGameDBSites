name: Deploy Nuxt sites to Cloudflare

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site:
          - name: aidalon-db
            worker_name: aidalondb
            site_id: aidalondb
            api_base_url: https://api.aidalon-db.com

    name: Deploy ${{ matrix.site.name }}
    defaults:
      run:
        working-directory: CardGameDBSites.Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: CardGameDBSites.Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt for Cloudflare
        run: npx nuxi build --preset cloudflare

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy \
            --config wrangler.jsonc \
            --name "${{ matrix.site.worker_name }}" \
            --var "NUXT_API_BASE_URL:${{ matrix.site.api_base_url }}" \
            --var "NUXT_PUBLIC_API_BASE_URL:${{ matrix.site.api_base_url }}" \
            --var "API_BASE_URL:${{ matrix.site.api_base_url }}" \
            --var "NUXT_PUBLIC_SITE_ID:${{ matrix.site.site_id }}"
